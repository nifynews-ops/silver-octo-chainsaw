<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Анонимный чат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ========== ЭКРАН ПОИСКА ========== */
        #search-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .search-animation {
            width: 100px;
            height: 100px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-text {
            margin-top: 30px;
            font-size: 24px;
            font-weight: 500;
        }

        .search-subtext {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* ========== ЭКРАН ЧАТА ========== */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .chat-status {
            font-size: 12px;
            color: #28a745;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.received .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:active {
            background: #e0e0e0;
        }

        .action-btn.danger {
            color: #dc3545;
            border-color: #dc3545;
        }

        .chat-input-container {
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        #message-input:focus {
            border-color: #007bff;
        }

        #send-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #send-btn:active {
            background: #0056b3;
        }

        .system-message {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран поиска -->
        <div id="search-screen">
            <div class="search-animation"></div>
            <div class="search-text">Ищем собеседника...</div>
            <div class="search-subtext">Это может занять некоторое время</div>
        </div>

        <!-- Экран чата -->
        <div id="chat-screen">
            <div class="chat-header">
                <h2 id="partner-name">Собеседник</h2>
                <div class="chat-status">● Онлайн</div>
            </div>

            <div class="chat-messages" id="messages">
                <div class="system-message">
                    🎭 Диалог начат. Соблюдайте правила!
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="nextChat()">⏭ Следующий</button>
                <button class="action-btn danger" onclick="endChat()">❌ Завершить</button>
            </div>

            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Введите сообщение..."
                    onkeypress="handleKeyPress(event)"
                >
                <button id="send-btn" onclick="sendMessage()">▶</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 1000000);
        const API_URL = window.location.origin;

        let partnerId = null;
        let partnerName = '';
        let checkInterval = null;

        // ========== ПОИСК СОБЕСЕДНИКА ==========
        async function startSearch() {
            try {
                const response = await fetch(`${API_URL}/api/search`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });

                const data = await response.json();

                if (response.status === 403) {
                    tg.showAlert('Вы заблокированы!');
                    tg.close();
                    return;
                }

                if (data.found) {
                    partnerId = data.partner_id;
                    partnerName = data.partner_name || 'Анонимный собеседник';
                    showChatScreen();
                } else {
                    setTimeout(startSearch, 2000);
                }
            } catch (error) {
                console.error('Search error:', error);
                setTimeout(startSearch, 3000);
            }
        }

        function showChatScreen() {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('partner-name').textContent = partnerName;
            document.getElementById('message-input').focus();
            
            // Проверяем статус диалога каждые 3 секунды
            checkInterval = setInterval(checkDialogStatus, 3000);
        }

        // ========== ПРОВЕРКА СТАТУСА ==========
        async function checkDialogStatus() {
            try {
                const response = await fetch(`${API_URL}/api/check?user_id=${userId}`);
                const data = await response.json();

                if (!data.active) {
                    clearInterval(checkInterval);
                    addSystemMessage('Собеседник покинул чат');
                    setTimeout(() => tg.close(), 2000);
                }
            } catch (error) {
                console.error('Check status error:', error);
            }
        }

        // ========== ОТПРАВКА СООБЩЕНИЯ ==========
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text) return;

            // Добавляем своё сообщение
            addMessage(text, true);
            input.value = '';

            try {
                const response = await fetch(`${API_URL}/api/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        text: text
                    })
                });

                if (response.status === 403) {
                    tg.showAlert('Вы заблокированы за нарушение правил!');
                    setTimeout(() => tg.close(), 1000);
                }

                if (!response.ok) {
                    addSystemMessage('Не удалось отправить сообщение');
                }
            } catch (error) {
                console.error('Send error:', error);
                addSystemMessage('Ошибка отправки');
            }
        }

        function addMessage(text, isSent) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;

            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                         now.getMinutes().toString().padStart(2, '0');

            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-time">${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // ========== УПРАВЛЕНИЕ ДИАЛОГОМ ==========
        async function nextChat() {
            if (confirm('Начать поиск нового собеседника?')) {
                await endDialogAPI();
                location.reload();
            }
        }

        async function endChat() {
            if (confirm('Завершить диалог?')) {
                await endDialogAPI();
                tg.close();
            }
        }

        async function endDialogAPI() {
            try {
                await fetch(`${API_URL}/api/end`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });
            } catch (error) {
                console.error('End dialog error:', error);
            }
        }

        // ========== ЗАПУСК ==========
        startSearch();

        // Обработка закрытия WebApp
        window.addEventListener('beforeunload', () => {
            if (checkInterval) {
                clearInterval(checkInterval);
            }
        });
    </script>
</body>
</html>
